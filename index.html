<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Candy Paws</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:url('fondoweb.png') center/cover fixed;
color:#fff;
}

/* CONTENEDOR GENERAL */
.container{
padding:12px;
max-width:1100px;
margin:auto;
}

/* BANNER */
.banner{
background:#fff;
color:#000;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 15px;
position:sticky;
top:0;
z-index:999;
}

.banner h1{
font-size:16px;
margin:0 auto;
font-weight:600;
}

.banner img{
width:30px;
}

/* MENU */
.menu-btn{
font-size:24px;
cursor:pointer;
}

.sidebar{
position:fixed;
left:-300px;
top:0;
width:280px;
height:100%;
background:#fff;
color:#000;
padding:20px;
transition:.3s;
z-index:1000;
}

.sidebar.active{
left:0;
}

.sidebar h2{
font-size:14px;
display:flex;
align-items:center;
gap:5px;
}

.sidebar img{
width:25px;
}

.sidebar button{
width:100%;
margin:10px 0;
padding:10px;
border:none;
background:#000;
color:#fff;
cursor:pointer;
}

/* PORTADAS */
.portada{
width:100%;
margin:10px 0;
}

/* PRODUCTOS */
.grid{
display:grid;
grid-template-columns:1fr;
gap:15px;
}

.product{
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
border:1px solid #000;
}

.product img{
width:100%;
border:1px solid #000;
border-radius:8px;
}

.product h3{
margin:5px 0;
font-size:14px;
}

.price-old{
text-decoration:line-through;
color:#aaa;
font-size:12px;
}

.price-new{
color:#5ce1e6;
font-weight:bold;
}

.btn{
width:100%;
padding:8px;
margin-top:5px;
border:none;
cursor:pointer;
}

.buy{
background:#83d7a0;
color:#000;
}

.info{
background:#000;
color:#fff;
}

.buy-options{
display:none;
flex-direction:column;
}

.buy-options.active{
display:flex;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#fff;
color:#000;
padding:20px;
width:90%;
max-width:400px;
z-index:2000;
border-radius:10px;
}

.overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:1500;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
width:60px;
}

/* COMENTARIOS */
.comments{
background:#f0f2f5;
color:#000;
padding:15px;
border-radius:10px;
}

.comment{
background:#fff;
padding:10px;
border-radius:10px;
margin:10px 0;
}

.star{
font-size:20px;
cursor:pointer;
color:#ccc;
}

.star.active{
color:gold;
}
</style>
</head>
<body>
<div class="banner">
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<h1>CANDY PEWS</h1>
<img src="logoweb.png">
</div>

<div class="sidebar" id="menu">
<h2>Candy Pew <img src="logoweb.png"></h2>

<button onclick="openCatalog()">Ir a la tienda</button>
<button onclick="contacto()">Contacto</button>
<button onclick="scrollRedes()">Seguinos en redes</button>
</div>
<div class="container">

<img src="portadauno.png" class="portada">
<img src="portadados.png" class="portada">
<img src="portadatres.png" class="portada">
<h2>Gomitas de Colageno 100% Natural</h2>

<div class="grid" id="productos"></div>
<div class="overlay" id="overlay"></div>

<div class="modal" id="infoModal">
<h3 id="infoTitle"></h3>
<p id="infoText"></p>
<button onclick="closeModal()">Cerrar</button>
</div>
<div class="comments">

<h3>Contanos tu experiencia</h3>

<input id="nombre" placeholder="Tu nombre">

<div>
<span class="star" data-value="1">★</span>
<span class="star" data-value="2">★</span>
<span class="star" data-value="3">★</span>
<span class="star" data-value="4">★</span>
<span class="star" data-value="5">★</span>
</div>

<textarea id="comentario" placeholder="Contanos tu experiencia"></textarea>

<button onclick="guardarComentario()">Enviar comentario</button>

<div id="listaComentarios"></div>

</div>
<img src="whatsappweb.png" class="whatsapp" onclick="contacto()">
<script>

const productos = {
gomitas:[
{
nombre:"Gomitas x 1/2kg",
imagen:"gomitasuno.png",
precio:"$9.050",
precioOferta:"$8.200",
info:"Gomitas naturales..."
},
{
nombre:"Gomitas x 1kg",
imagen:"gomitasdos.png",
precio:"$16.950",
precioOferta:"$16.000",
info:"Gomitas naturales..."
}
]
};

function crearProducto(p){
return `
<div class="product">
<img src="${p.imagen}">
<h3>${p.nombre}</h3>
<p class="price-old">${p.precio}</p>
<p class="price-new">${p.precioOferta}</p>

<button class="btn buy" onclick="toggleBuy(this)">Comprar</button>
<button class="btn info" onclick="verInfo('${p.nombre}','${p.info}')">Info</button>

<div class="buy-options">
<button onclick="whatsapp('${p.nombre} retiro')">Retiro</button>
<button onclick="whatsapp('${p.nombre} envio')">Envio</button>
</div>
</div>
`;
}

function render(){
document.getElementById("productos").innerHTML =
productos.gomitas.map(crearProducto).join("");
}

render();

</script>
<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

function toggleBuy(btn){
btn.parentElement.querySelector(".buy-options").classList.toggle("active");
}

function whatsapp(text){
window.open("https://wa.me/5492396512544?text="+encodeURIComponent("Hola! "+text));
}

function verInfo(t,i){
document.getElementById("infoTitle").innerText=t;
document.getElementById("infoText").innerText=i;
document.getElementById("infoModal").style.display="block";
document.getElementById("overlay").style.display="block";
}

function closeModal(){
document.getElementById("infoModal").style.display="none";
document.getElementById("overlay").style.display="none";
}

function contacto(){
whatsapp("Quiero hacer una consulta");
}

function openCatalog(){
alert("Catálogo abierto (conectar con tu modal)");
}

function scrollRedes(){
window.scrollTo(0,document.body.scrollHeight);
}

</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDxX70OyFYiQcw1SwX51Mv6fCt_jloYddk",
authDomain: "estrellas-y-comentarios.firebaseapp.com",
projectId: "estrellas-y-comentarios",
storageBucket: "estrellas-y-comentarios.firebasestorage.app",
messagingSenderId: "593954229438",
appId: "1:593954229438:web:2d5c4f9ea6aa13ea9d62ef"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

signInAnonymously(auth);

let rating=5;

document.querySelectorAll('.star').forEach(s=>{
s.onclick=()=>{
rating=parseInt(s.dataset.value);
updateStars();
};
});

function updateStars(){
document.querySelectorAll('.star').forEach(s=>{
s.classList.toggle("active",parseInt(s.dataset.value)<=rating);
});
}

window.guardarComentario=async()=>{
const nombre=document.getElementById("nombre").value||"Anonimo";
const comentario=document.getElementById("comentario").value;

await addDoc(collection(db,"comentarios"),{
nombre,comentario,estrellas:rating,fecha:Date.now()
});

alert("Comentario enviado");
cargarComentarios();
};

async function cargarComentarios(){
const q=query(collection(db,"comentarios"),orderBy("fecha","desc"));
const snap=await getDocs(q);

const cont=document.getElementById("listaComentarios");
cont.innerHTML="";

snap.forEach(doc=>{
const d=doc.data();
cont.innerHTML+=`
<div class="comment">
<b>${d.nombre}</b>
<div>${"⭐".repeat(d.estrellas)}</div>
<p>${d.comentario}</p>
</div>
`;
});
}

window.onload=()=>{
updateStars();
cargarComentarios();
};

</script>
</div>
</body>
</html>
