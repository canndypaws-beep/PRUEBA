        .star {

            transition: all 0.2s;

    <!-- SCRIPT FIREBASE ACTUALIZADO CON LOG DE ERRORES -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyB6Ew3Iqjsu3Ry7YxYuzq5BuwiLriaoT0U",
          authDomain: "estrella-opiniones.firebaseapp.com",
          projectId: "estrella-opiniones",
          storageBucket: "estrella-opiniones.firebasestorage.app",
          messagingSenderId: "1020784892646",
          appId: "1:1020784892646:web:b1432dc740bd20ed27f927",
          measurementId: "G-251RMXQCHE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentRating = 5;
        const stars = document.querySelectorAll('#star-rating .star');

        stars.forEach(star => {
            star.addEventListener('click', () => {
                currentRating = parseInt(star.dataset.value);
                document.getElementById('rating').value = currentRating;
                updateStars();
            });
        });

        function updateStars() {
            stars.forEach(star => {
                if (parseInt(star.dataset.value) <= currentRating) {
                    star.classList.add('active');
                    star.classList.remove('fa-regular');
                    star.classList.add('fa-solid');
                } else {
                    star.classList.remove('active');
                    star.classList.add('fa-regular');
                    star.classList.remove('fa-solid');
                }
            });
        }

        window.guardarComentario = async function () {
            const estrellas = parseInt(document.getElementById("rating").value);
            const comentario = document.getElementById("comentario").value.trim();

            if (!comentario) {
                alert("Por favor escribí un comentario");
                return;
            }

            try {
                await addDoc(collection(db, "opiniones"), {
                    estrellas: estrellas,
                    comentario: comentario,
                    fecha: new Date().toISOString()
                });

                alert("¡Gracias! Tu opinión se guardó correctamente ❤️");
                document.getElementById("comentario").value = "";
                currentRating = 5;
                updateStars();
            } catch (error) {
                console.error("ERROR REAL en Firestore:", error.code, error.message);
                alert("Error al enviar el comentario.\n\nRevisa la consola (F12) para más detalles.");
            }
        };

        async function cargarComentariosModal() {
            const cont = document.getElementById("listaComentariosModal");
            cont.innerHTML = "<p class='text-center py-10 text-gray-500'>Cargando opiniones...</p>";

            try {
                const snapshot = await getDocs(collection(db, "opiniones"));
                cont.innerHTML = "";

                if (snapshot.empty) {
                    cont.innerHTML = "<p class='text-center py-12 text-gray-500'>Aún no hay comentarios. ¡Sé el primero!</p>";
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const fecha = new Date(data.fecha).toLocaleDateString('es-AR');
                    cont.innerHTML += `
                        <div class="comentario-card">
                            <div class="flex justify-between items-start mb-4">
                                <span class="font-semibold text-lg">Anónimo</span>
                                <span class="estrellas-big">${"⭐".repeat(data.estrellas)}</span>
                            </div>
                            <p class="text-[#222222] text-lg leading-relaxed">${data.comentario}</p>
                            <p class="text-xs text-gray-400 mt-6 text-right">${fecha}</p>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("ERROR al cargar comentarios:", error);
                cont.innerHTML = "<p class='text-center py-8 text-red-500'>Error al cargar comentarios. Revisa la consola.</p>";
            }
        }

        window.mostrarComentarios = function() {
            document.getElementById('modal-comentarios').classList.remove('hidden');
            document.getElementById('modal-comentarios').classList.add('flex');
            cargarComentariosModal();
        };

        window.cerrarModalComentarios = function() {
            const m = document.getElementById('modal-comentarios');
            m.classList.add('hidden');
            m.classList.remove('flex');
        };

        window.addEventListener('load', () => {
            updateStars();
            console.log('%c✅ Candy Paws - Sistema de opiniones con logging de errores listo', 'color:#E6B1B9; font-weight:700;');
        });
    </script>
